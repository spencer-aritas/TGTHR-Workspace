version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: web/Dockerfile
    environment:
      - NODE_ENV=production
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    
  api:
    user: "1000:1000"
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      # Loads SF_{BENEFITS,PROD}_JWT_* and SF_JWT_PRIVATE_KEY from
      # pwa-sync-starter/.env so settings.py picks them up regardless
      # of which SF_ENV is selected.
      - .env
    environment:
      - TZ=America/Denver
      - SF_ENV=prod
      - SF_BENEFITS_JWT_LOGIN_URL=https://tgthrnpc--benefits.sandbox.lightning.force.com/
      - APP_BASE_URL=https://outreachintake.aritasconsulting.com
      - DB_PATH=/app/data/app.duckdb
      - SQLITE_DB_PATH=/app/data/server.db
      - PYTHONPATH=/app
    volumes:
      - type: bind
        source: ./server/data
        target: /app/data
      - type: bind
        source: ./jwt_private.key
        target: /app/jwt_private.key
        read_only: true

    networks:
      - app_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  docgen:
    build:
      context: ../tgthr-docgen
      dockerfile: Dockerfile
    env_file:
      - ../tgthr-docgen/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DUCKDB_PATH=/app/data/tgthr_program_data.duckdb
      - GOTENBERG_URL=http://gotenberg:3000
    depends_on:
      - gotenberg
    volumes:
      - type: bind
        source: ../tgthr-docgen/data
        target: /app/data
      - type: bind
        source: ../tgthr-docgen/documents
        target: /app/documents
      - type: bind
        source: ./jwt_private.key
        target: /app/jwt_private.key
        read_only: true
    networks:
      - app_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_net
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - web
      - api
      - docgen

  gotenberg:
    image: gotenberg/gotenberg:8
    networks:
      - app_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app_net:
    driver: bridge

volumes:
  app_data:
    driver: local
  caddy_data:
  caddy_config: