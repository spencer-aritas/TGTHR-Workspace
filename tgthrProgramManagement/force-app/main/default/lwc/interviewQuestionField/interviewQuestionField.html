<template>
    <div class={questionFieldClass}>
        <template if:true={hasCarryForwardPrompt}>
            <section class="carry-forward-card slds-m-bottom_small" aria-label="Carry forward review">
                <div class="carry-forward-card__header">
                    <p class="carry-forward-card__eyebrow">Carry Forward Review</p>
                    <h3 class="carry-forward-card__title">{question.label}</h3>
                </div>
                <div class="carry-forward-card__body">
                    <p><strong>Field Value:</strong> {carryForward.displayValue}</p>
                    <p><strong>Date Recorded:</strong> {carryForward.recordedDateLabel}</p>
                    <p><strong>Author/Type:</strong> {carryForward.sourceLabel}</p>
                </div>
                <template if:true={carryForward.actionLabel}>
                    <p class="carry-forward-card__status slds-m-top_small">
                        <strong>Reviewed:</strong> {carryForward.actionLabel}
                    </p>
                </template>
                <div class="slds-button-group slds-m-top_small" role="group">
                    <lightning-button
                        label="Confirm"
                        variant="brand-outline"
                        onclick={handleConfirmCarryForward}>
                    </lightning-button>
                    <lightning-button
                        label="Edit"
                        variant="neutral"
                        onclick={handleEditCarryForward}>
                    </lightning-button>
                    <lightning-button
                        label="Ignore"
                        variant="destructive-text"
                        onclick={handleIgnoreCarryForward}>
                    </lightning-button>
                </div>
                <template if:true={carryForward.requiresReview}>
                    <p class="carry-forward-card__warning slds-m-top_x-small">Review required before submit.</p>
                </template>
            </section>
        </template>

        <!-- Text -->
        <template if:true={isText}>
            <lightning-input
                type="text"
                label={question.label}
                value={question.answer}
                data-input-control
                data-question-id={question.questionId}
                data-response-type={question.responseType}
                onchange={handleChange}
                required={question.required}
                disabled={question.isReadOnly}
                field-level-help={question.helpText}>
            </lightning-input>
        </template>

        <!-- Textarea -->
        <template if:true={isTextarea}>
            <lightning-textarea
                label={question.label}
                value={question.answer}
                data-input-control
                data-question-id={question.questionId}
                data-response-type={question.responseType}
                onchange={handleChange}
                required={question.required}
                disabled={question.isReadOnly}
                field-level-help={question.helpText}>
            </lightning-textarea>
        </template>

        <!-- LongText (same as Textarea but can handle more characters) -->
        <template if:true={isLongText}>
            <lightning-textarea
                label={question.label}
                value={question.answer}
                data-input-control
                data-question-id={question.questionId}
                data-response-type={question.responseType}
                onchange={handleChange}
                required={question.required}
                disabled={question.isReadOnly}
                field-level-help={question.helpText}
                max-length="131072">
            </lightning-textarea>
        </template>

        <!-- RichText -->
        <template if:true={isRichText}>
            <lightning-input-rich-text
                label={question.label}
                value={question.answer}
                data-input-control
                data-question-id={question.questionId}
                data-response-type={question.responseType}
                onchange={handleChange}
                required={question.required}
                disabled={question.isReadOnly}
                field-level-help={question.helpText}>
            </lightning-input-rich-text>
        </template>

        <!-- Number -->
        <template if:true={isNumber}>
            <lightning-input
                type="number"
                label={question.label}
                value={question.answer}
                data-input-control
                data-question-id={question.questionId}
                data-response-type={question.responseType}
                onchange={handleChange}
                required={question.required}
                disabled={question.isReadOnly}
                field-level-help={question.helpText}
                step="any"
                formatter="decimal">
            </lightning-input>
        </template>

        <!-- Boolean -->
        <template if:true={isBoolean}>
            <template if:true={isBooleanYesNo}>
                <lightning-radio-group
                    label={question.label}
                    options={yesNoOptions}
                    value={booleanValue}
                    data-input-control
                    data-question-id={question.questionId}
                    data-response-type={question.responseType}
                    onchange={handleChange}
                    required={question.required}
                    disabled={question.isReadOnly}
                    field-level-help={question.helpText}>
                </lightning-radio-group>
            </template>
            <template if:false={isBooleanYesNo}>
                <lightning-input
                    type="checkbox"
                    label={question.label}
                    checked={question.answer}
                    data-input-control
                    data-question-id={question.questionId}
                    data-response-type={question.responseType}
                    disabled={question.isReadOnly}
                    onchange={handleChange}
                    field-level-help={question.helpText}>
                </lightning-input>
            </template>
        </template>

        <!-- Picklist -->
        <template if:true={isPicklist}>
            <lightning-combobox
                label={question.label}
                value={question.answer}
                options={question.picklistOptions}
                data-input-control
                data-question-id={question.questionId}
                data-response-type={question.responseType}
                onchange={handleChange}
                required={question.required}
                disabled={question.isReadOnly}
                field-level-help={question.helpText}>
            </lightning-combobox>
        </template>

        <!-- Radio Toggles (multiple checkboxes) -->
        <template if:true={isRadios}>
            <fieldset class="slds-form-element">
                <legend class="slds-form-element__legend slds-form-element__label">
                    {question.label}
                    <template if:true={question.required}>
                        <abbr class="slds-required" title="required">*</abbr>
                    </template>
                </legend>
                <template if:true={question.helpText}>
                    <div class="slds-form-element__help">{question.helpText}</div>
                </template>
                <div class="slds-form-element__control">
                    <template for:each={radioOptions} for:item="option">
                        <div key={option.value} class="slds-checkbox slds-m-bottom_x-small">
                            <lightning-input
                                type="checkbox"
                                label={option.label}
                                checked={option.checked}
                                disabled={question.isReadOnly}
                                data-value={option.value}
                                onchange={handleRadioChange}>
                            </lightning-input>
                        </div>
                    </template>
                </div>
            </fieldset>
        </template>

        <!-- Date -->
        <template if:true={isDate}>
            <lightning-input
                type="date"
                label={question.label}
                value={question.answer}
                data-input-control
                data-question-id={question.questionId}
                data-response-type={question.responseType}
                onchange={handleChange}
                required={question.required}
                disabled={question.isReadOnly}
                field-level-help={question.helpText}>
            </lightning-input>
        </template>

        <!-- Datetime -->
        <template if:true={isDatetime}>
            <lightning-input
                type="datetime"
                label={question.label}
                value={question.answer}
                data-input-control
                data-question-id={question.questionId}
                data-response-type={question.responseType}
                onchange={handleChange}
                required={question.required}
                disabled={question.isReadOnly}
                field-level-help={question.helpText}>
            </lightning-input>
        </template>

        <!-- Default fallback for unknown types -->
        <template if:true={showDefault}>
            <lightning-input
                type="text"
                label={question.label}
                value={question.answer}
                data-input-control
                data-question-id={question.questionId}
                data-response-type={question.responseType}
                onchange={handleChange}
                required={question.required}
                disabled={question.isReadOnly}
                field-level-help={question.helpText}>
            </lightning-input>
            <div class="slds-text-color_error slds-m-top_xx-small">
                Unknown response type: {question.responseType}
            </div>
        </template>
    </div>
</template>
