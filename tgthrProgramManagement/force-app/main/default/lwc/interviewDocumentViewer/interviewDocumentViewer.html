<template>
    <lightning-card title="Completed Documentation" icon-name="custom:custom63">
        <div class="slds-grid slds-gutters">
            <!-- Left Panel: Document List -->
            <div class="slds-col slds-size_1-of-3 document-list-panel">
                <div class="slds-p-around_small">
                    <template if:true={isLoading}>
                        <lightning-spinner alternative-text="Loading documents" size="small"></lightning-spinner>
                    </template>
                    
                    <template if:false={isLoading}>
                        <template if:true={hasDocuments}>
                            <div class="slds-text-body_small slds-m-bottom_small text-muted">
                                {documents.length} document{pluralSuffix}
                            </div>
                            
                            <ul class="slds-has-dividers_bottom-space">
                                <template for:each={documents} for:item="doc">
                                    <li key={doc.id} class="slds-item slds-p-vertical_x-small">
                                        <div class={doc.itemClass} data-id={doc.id} onclick={handleDocumentClick}>
                                            <div class="slds-grid slds-grid_vertical-align-center">
                                                <div class="slds-col slds-has-flexi-truncate">
                                                    <div class="slds-text-heading_small slds-truncate">
                                                        {doc.displayName}
                                                        <template if:true={doc.isActivePlan}>
                                                            <span class="completed-badge completed-badge--active slds-m-left_xx-small">Active</span>
                                                        </template>
                                                        <template if:true={doc.isInactivePlan}>
                                                            <span class="completed-badge completed-badge--inactive slds-m-left_xx-small">Inactive</span>
                                                        </template>
                                                        <template if:true={doc.isAmendment}>
                                                            <span class="completed-badge completed-badge--amendment slds-m-left_xx-small">Amended</span>
                                                        </template>                                                    </div>
                                                    <div class="slds-text-body_small text-muted slds-grid slds-grid_vertical-align-center">
                                                        <span class="slds-truncate">Interaction ({mountainTimeZoneLabel}): {doc.displayDateFormatted}</span>
                                                        <template if:true={doc.showUnlockIcon}>
                                                            <lightning-icon icon-name="utility:unlock" size="xx-small" variant="success" title="Within 72-hour recall window" class="slds-m-left_xx-small slds-no-flex"></lightning-icon>
                                                        </template>
                                                        <template if:true={doc.showLockIcon}>
                                                            <lightning-icon icon-name="utility:lock" size="xx-small" class="slds-m-left_xx-small slds-no-flex text-muted" title="Edit window closed"></lightning-icon>
                                                        </template>
                                                    </div>
                                                    <!-- Signed by info -->
                                                    <div class="slds-text-body_small">
                                                        <template if:true={doc.staffSignerName}>
                                                            <lightning-icon icon-name="utility:check" size="xx-small" class="slds-m-right_xx-small success-icon"></lightning-icon>
                                                            <span class="slds-text-color_success slds-truncate">{doc.staffSignerName}</span>
                                                        </template>
                                                        <template if:false={doc.staffSignerName}>
                                                            <template if:true={doc.clientSigned}>
                                                                <lightning-icon icon-name="utility:success" size="xx-small" class="slds-m-right_xx-small success-icon"></lightning-icon>
                                                            </template>
                                                            <template if:false={doc.clientSigned}>
                                                                <lightning-icon icon-name="utility:close" size="xx-small" class="slds-m-right_xx-small text-muted"></lightning-icon>
                                                            </template>
                                                            <span class={doc.signatureClass}>{doc.signatureStatus}</span>
                                                        </template>
                                                    </div>
                                                    <!-- Manager co-sign if applicable -->
                                                    <template if:true={doc.managerSigned}>
                                                        <div class="slds-text-body_small">
                                                            <lightning-icon icon-name="utility:approval" size="xx-small" class="slds-m-right_xx-small" style="fill: #0176d3;"></lightning-icon>
                                                            <span class="text-muted slds-truncate">Co-sign: {doc.managerSignerName}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                                <div class="slds-col slds-no-flex">
                                                    <lightning-icon icon-name="utility:chevronright" size="x-small"></lightning-icon>
                                                </div>
                                            </div>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        
                        <template if:false={hasDocuments}>
                            <div class="slds-text-align_center slds-p-around_large">
                                <lightning-icon icon-name="utility:page" size="large" class="slds-m-bottom_small text-muted"></lightning-icon>
                                <p class="slds-text-body_regular text-muted">No completed documentation found</p>
                            </div>
                        </template>
                    </template>
                </div>
            </div>
            
            <!-- Right Panel: Document Details -->
            <div class="slds-col slds-size_2-of-3 preview-panel">
                <template if:true={selectedDocument}>
                    <div class="slds-p-around_medium">
                        <!-- Document Header -->
                        <div class="completed-header slds-m-bottom_medium">
                            <div class="completed-header__summary">
                                <h2 class="slds-text-heading_medium">{documentName}</h2>
                                <div class="slds-m-top_xx-small">
                                    <template if:true={selectedDocument.templateCategory}>
                                        <span class="completed-badge completed-badge--neutral">{selectedDocument.templateCategory}</span>
                                    </template>
                                    <span class={selectedDocument.statusBadgeClass}>{selectedDocument.statusBadgeLabel}</span>
                                    <template if:true={selectedDocument.isActivePlan}>
                                        <span class="completed-badge completed-badge--active slds-m-left_xx-small">Active</span>
                                    </template>
                                    <template if:true={selectedDocument.isInactivePlan}>
                                        <span class="completed-badge completed-badge--inactive slds-m-left_xx-small">Inactive</span>
                                    </template>
                                    <template if:true={selectedDocument.isAmendment}>
                                        <span class="completed-badge completed-badge--amendment slds-m-left_xx-small">Amended</span>
                                    </template>
                                </div>
                                <div class="slds-text-body_small text-muted slds-m-top_xx-small">
                                    Submitted By: {submittedByDisplay} • Submitted On: {submittedOnDisplay}
                                </div>
                            </div>
                            <div class="completed-header__actions">
                                <div class="completed-header__action-row">
                                    <lightning-button 
                                        variant="brand"
                                        label="Download PDF" 
                                        icon-name="utility:download" 
                                        onclick={handleDownload}
                                        class="completed-header__action-button"
                                        disabled={isOpeningInFiles}>
                                    </lightning-button>
                                    <template if:true={showWordDownload}>
                                        <lightning-button
                                            variant="neutral"
                                            label="Download in Word"
                                            icon-name="utility:file"
                                            onclick={handleDownloadWord}
                                            class="completed-header__action-button"
                                            disabled={isOpeningInFiles}>
                                        </lightning-button>
                                    </template>
                                    <lightning-button 
                                        variant="neutral"
                                        label="Open in Files" 
                                        icon-name="utility:new_window" 
                                        onclick={handleOpenInFiles}
                                        class="completed-header__action-button"
                                        disabled={isOpeningInFiles}>
                                    </lightning-button>
                                    <template if:true={showRecallButton}>
                                        <template if:false={showRecallConfirm}>
                                            <lightning-button
                                                variant="destructive-text"
                                                label="Recall Document"
                                                icon-name="utility:undo"
                                                onclick={handleRecall}
                                                class="completed-header__action-button"
                                                disabled={isRecalling}>
                                            </lightning-button>
                                        </template>
                                        <template if:true={showRecallConfirm}>
                                            <div class="slds-box slds-box_x-small slds-theme_shade completed-header__recall-confirm">
                                                <p class="slds-text-body_small slds-m-bottom_x-small">Recall this document? All signatures will be cleared and it will return to Pending Documentation.</p>
                                                <lightning-button
                                                    variant="destructive"
                                                    label="Yes, Recall"
                                                    onclick={handleRecallConfirm}
                                                    disabled={isRecalling}>
                                                </lightning-button>
                                                <lightning-button
                                                    variant="neutral"
                                                    label="Cancel"
                                                    onclick={handleRecallCancel}
                                                    class="slds-m-left_x-small"
                                                    disabled={isRecalling}>
                                                </lightning-button>
                                            </div>
                                        </template>
                                    </template>
                                    <template if:true={isOpeningInFiles}>
                                        <lightning-spinner alternative-text="Opening file" size="small"></lightning-spinner>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- Note Detail View (Notes only) -->
                        <template if:true={isNote}>
                            <div class="slds-m-bottom_medium">
                                <c-note-detail-display
                                    record-id={selectedDocument.id}
                                    record-type="Interaction"
                                    completed-view>
                                </c-note-detail-display>
                            </div>
                        </template>

                        <!-- Interview Detail View (Interviews only) -->
                        <template if:false={isNote}>
                            <div class="slds-m-bottom_medium">
                                <c-note-detail-display
                                    record-id={interviewDetailRecordId}
                                    record-type={interviewDetailRecordType}
                                    completed-view>
                                </c-note-detail-display>
                            </div>
                        </template>

                        <!-- Record Link -->
                        <div class="slds-text-align_center slds-m-top_medium">
                            <template if:true={isNote}>
                                <a href={noteRecordUrl} class="slds-text-link slds-text-body_small">
                                    View Note Record
                                </a>
                            </template>
                            <template if:false={isNote}>
                                <a href={interviewRecordUrl} class="slds-text-link slds-text-body_small">
                                    View Interview Record
                                </a>
                            </template>
                        </div>
                    </div>
                </template>
                
                <template if:false={selectedDocument}>
                    <div class="slds-text-align_center slds-p-around_xx-large">
                        <lightning-icon icon-name="utility:preview" size="large" class="slds-m-bottom_small text-muted"></lightning-icon>
                        <p class="slds-text-heading_small text-muted">Select a document to view details</p>
                    </div>
                </template>
            </div>
        </div>
    </lightning-card>

    <!-- Recalled Note Modals — opened immediately after a note is recalled so the user can edit inline -->
    <template if:true={showRecalledClinicalNoteModal}>
        <section role="dialog" tabindex="-1" aria-modal="true"
            aria-labelledby="recalled-clinical-note-modal-heading"
            class="slds-modal slds-fade-in-open documentation-modal">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" icon-name="utility:close"
                        alternative-text="Close" variant="bare-inverse"
                        onclick={closeRecalledNoteModal}>
                    </lightning-button-icon>
                    <h2 id="recalled-clinical-note-modal-heading" class="slds-text-heading_medium">Edit &amp; Resubmit Clinical Note</h2>
                </header>
                <div class="slds-modal__content modal-body">
                    <c-clinical-note
                        record-id={_caseId}
                        interaction-id={recalledNoteInteractionId}
                        onclose={closeRecalledNoteModal}>
                    </c-clinical-note>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button variant="neutral" label="Close" onclick={closeRecalledNoteModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showRecalledCaseNoteModal}>
        <section role="dialog" tabindex="-1" aria-modal="true"
            aria-labelledby="recalled-case-note-modal-heading"
            class="slds-modal slds-fade-in-open documentation-modal">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" icon-name="utility:close"
                        alternative-text="Close" variant="bare-inverse"
                        onclick={closeRecalledNoteModal}>
                    </lightning-button-icon>
                    <h2 id="recalled-case-note-modal-heading" class="slds-text-heading_medium">Edit &amp; Resubmit Case Note</h2>
                </header>
                <div class="slds-modal__content modal-body">
                    <c-clinical-note-form
                        record-id={_caseId}
                        interaction-id={recalledNoteInteractionId}
                        onclose={closeRecalledNoteModal}>
                    </c-clinical-note-form>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button variant="neutral" label="Close" onclick={closeRecalledNoteModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showRecalledPeerNoteModal}>
        <section role="dialog" tabindex="-1" aria-modal="true"
            aria-labelledby="recalled-peer-note-modal-heading"
            class="slds-modal slds-fade-in-open documentation-modal">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" icon-name="utility:close"
                        alternative-text="Close" variant="bare-inverse"
                        onclick={closeRecalledNoteModal}>
                    </lightning-button-icon>
                    <h2 id="recalled-peer-note-modal-heading" class="slds-text-heading_medium">Edit &amp; Resubmit Peer Note</h2>
                </header>
                <div class="slds-modal__content modal-body">
                    <c-peer-note
                        record-id={_caseId}
                        interaction-id={recalledNoteInteractionId}
                        onclose={closeRecalledNoteModal}>
                    </c-peer-note>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button variant="neutral" label="Close" onclick={closeRecalledNoteModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
