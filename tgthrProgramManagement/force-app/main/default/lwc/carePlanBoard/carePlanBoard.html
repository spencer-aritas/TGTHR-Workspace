<template>
    <div class="care-plan-board">

        <!-- Loading -->
        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_xx-large">
                <lightning-spinner alternative-text="Loading Care Plan data"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={isReady}>

            <!-- ── Care Plan Status ──────────────────────────────── -->
            <lightning-card>
                <div slot="title" class="board-card-title">
                    <lightning-icon icon-name="utility:note" size="x-small" class="board-card-title__icon"></lightning-icon>
                    <span>Care Plan Details</span>
                </div>
                <div class="slds-p-around_medium">
                    <template lwc:if={hasCarePlanSummary}>
                        <div class="slds-grid slds-gutters slds-wrap">

                            <!-- Review dates -->
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                <p class="slds-text-title_caps slds-m-bottom_x-small">Review Dates</p>
                                <dl>
                                    <dt class="slds-text-color_weak slds-text-body_small">Last Review</dt>
                                    <dd class="slds-m-bottom_x-small">{formattedLastReview}</dd>
                                    <dt class="slds-text-color_weak slds-text-body_small">Next Review</dt>
                                    <dd>
                                        <span class={nextReviewClass}>{formattedNextReview}</span>
                                        <template lwc:if={boardData.carePlanSummary.isOverdueForReview}>
                                            <lightning-badge label="Overdue" variant="error"
                                                class="slds-m-left_x-small"></lightning-badge>
                                        </template>
                                        <template lwc:if={boardData.carePlanSummary.isDueSoon}>
                                            <lightning-badge label="Due Soon" variant="warning"
                                                class="slds-m-left_x-small"></lightning-badge>
                                        </template>
                                    </dd>
                                </dl>
                            </div>

                            <!-- Discharge -->
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                <p class="slds-text-title_caps slds-m-bottom_x-small">Discharge</p>
                                <dl>
                                    <dt class="slds-text-color_weak slds-text-body_small">Expected Date</dt>
                                    <dd class="slds-m-bottom_x-small">{formattedDischargeDate}</dd>
                                    <template lwc:if={hasDischargePlan}>
                                        <dt class="slds-text-color_weak slds-text-body_small">Plan</dt>
                                        <dd class="discharge-plan-text">{boardData.carePlanSummary.dischargePlan}</dd>
                                    </template>
                                </dl>
                            </div>

                            <!-- Consent status -->
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                <p class="slds-text-title_caps slds-m-bottom_x-small">Consent</p>
                                <div class="slds-m-bottom_x-small">
                                    <lightning-icon
                                        icon-name={carePlanReviewedIcon}
                                        variant={carePlanReviewedVariant}
                                        size="x-small"
                                        class="slds-m-right_x-small">
                                    </lightning-icon>
                                    <span>Participant Reviewed Plan</span>
                                </div>
                                <div>
                                    <lightning-icon
                                        icon-name={documentationOfferedIcon}
                                        variant={documentationOfferedVariant}
                                        size="x-small"
                                        class="slds-m-right_x-small">
                                    </lightning-icon>
                                    <span>Documentation Offered</span>
                                </div>
                            </div>

                        </div>

                        <template lwc:if={hasActivePlan}>
                            <div class="plan-meta-panel slds-m-top_medium">
                                <p class="slds-text-title_caps slds-m-bottom_small">Active Plan Metadata</p>
                                <div class="slds-grid slds-wrap slds-gutters_x-small plan-meta-grid">
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                                        <p class="plan-meta-label">Plan</p>
                                        <p class="plan-meta-value">{activePlan.name}</p>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                                        <p class="plan-meta-label">Started</p>
                                        <p class="plan-meta-value">{formattedActivePlanStart}</p>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                                        <p class="plan-meta-label">Next Assessment</p>
                                        <p class="plan-meta-value">{formattedNextAssessment}</p>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                                        <p class="plan-meta-label">Status</p>
                                        <p class="plan-meta-value">{activePlan.status}</p>
                                    </div>
                                    <template lwc:if={activePlan.caseManagerName}>
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                            <p class="plan-meta-label">Case Manager</p>
                                            <p class="plan-meta-value">{activePlan.caseManagerName}<span class="plan-meta-secondary"> · {formattedCMSignedDate}</span></p>
                                        </div>
                                    </template>
                                    <template lwc:if={activePlan.peerSupportName}>
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                            <p class="plan-meta-label">Peer Support</p>
                                            <p class="plan-meta-value">{activePlan.peerSupportName}<span class="plan-meta-secondary"> · {formattedPSSignedDate}</span></p>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template lwc:else>
                        <p class="slds-text-color_weak">No Care Plan record found for this Case.</p>
                    </template>
                </div>
            </lightning-card>

            <!-- ── Active Treatment Plan ─────────────────────────── -->
            <lightning-card class="slds-m-top_medium">
                <div slot="title" class="board-card-title">
                    <lightning-icon icon-name="utility:preview" size="x-small" class="board-card-title__icon"></lightning-icon>
                    <span>Active Treatment Plan</span>
                </div>
                <div class="slds-p-around_medium">
                    <template lwc:if={hasActivePlan}>
                        <div class="active-plan-section">
                            <div class="active-plan-banner">
                                <p class="active-plan-banner__eyebrow">Current signed plan</p>
                                <h3 class="active-plan-banner__title">{activePlan.name}</h3>
                                <p class="active-plan-banner__subtext">Open the most recent Treatment Plan document from the Case summary.</p>
                                <template lwc:if={activePlan.documentId}>
                                    <lightning-button
                                        label="View Document"
                                        icon-name="utility:preview"
                                        onclick={handleViewActivePlanDocument}
                                        class="active-plan-banner__action">
                                    </lightning-button>
                                </template>
                                <template lwc:else>
                                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                                        No generated document is linked to the active Treatment Plan yet.
                                    </p>
                                </template>
                            </div>
                        </div>
                    </template>
                    <template lwc:else>
                        <div class="slds-notify slds-notify_alert slds-theme_warning" role="status">
                            <lightning-icon icon-name="utility:warning" size="x-small"
                                class="slds-m-right_x-small"></lightning-icon>
                            No active Treatment Plan. A Treatment Plan will become active once all required
                            signatures are collected.
                        </div>
                    </template>
                </div>
            </lightning-card>

            <!-- ── Treatment Plan History ─────────────────────────── -->
            <lightning-card class="slds-m-top_medium">
                <div slot="title" class="board-card-title">
                    <lightning-icon icon-name="utility:list" size="x-small" class="board-card-title__icon"></lightning-icon>
                    <span>Treatment Plan History</span>
                </div>
                <div class="slds-p-around_medium">
                    <template lwc:if={hasHistory}>
                        <lightning-datatable
                            key-field="id"
                            data={paginatedHistory}
                            columns={historyColumns}
                            hide-checkbox-column
                            onrowaction={handleRowAction}>
                        </lightning-datatable>
                        <template lwc:if={showHistoryPagination}>
                            <div class="history-pagination slds-m-top_small">
                                <lightning-button-icon
                                    icon-name="utility:chevronleft"
                                    alternative-text="Previous page"
                                    title="Previous page"
                                    onclick={handlePreviousHistoryPage}
                                    disabled={isFirstHistoryPage}>
                                </lightning-button-icon>
                                <span class="history-pagination__label">{historyPageLabel}</span>
                                <lightning-button-icon
                                    icon-name="utility:chevronright"
                                    alternative-text="Next page"
                                    title="Next page"
                                    onclick={handleNextHistoryPage}
                                    disabled={isLastHistoryPage}>
                                </lightning-button-icon>
                            </div>
                        </template>
                    </template>
                    <template lwc:else>
                        <p class="slds-text-color_weak">No Treatment Plans found for this Case.</p>
                    </template>
                </div>
            </lightning-card>

        </template>

        <!-- Conflict modal (child) -->
        <c-treatment-plan-conflict-modal
            ontreatmentplanactivated={handlePlanActivated}
            onconflictcancelled={handleConflictCancelled}>
        </c-treatment-plan-conflict-modal>

    </div>
</template>
